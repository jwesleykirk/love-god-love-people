# Railway service config.
#
# Build and start commands are defined in nixpacks.toml so Nixpacks knows
# which packages to install (Node + uv aren't in the default Python provider).
# Postgres is added as a separate service; DATABASE_URL is referenced via
# the Railway variables UI (`${{Postgres.DATABASE_URL}}`).

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
