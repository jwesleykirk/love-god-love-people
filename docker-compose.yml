services:
  db:
    image: postgres:16
    container_name: s3-prototype-template-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prototype_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prototype_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
